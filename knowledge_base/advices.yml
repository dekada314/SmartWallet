types:
  - advice0: 
      category: entertainment
      name: Экономия на подарках
      description: |
         Не покупайте подарок в последний момент: вы потратите больше денег и вместо «той самой» вещи подарите случайную ерунду, которая не будет радовать. Если речь идет о подарках к всеобщим праздникам, накануне вы увидите задранные цены и пустые полки. Обидно? Еще бы.
  - advice1:
      category: takeaway_food
      name: Откажитесь от походов в кафе и рестораны
      description: Такие траты мы привыкли не замечать, но их урезание — верный способ сэкономить 10-15% дохода. Но важно не переусердствовать. Если исключите все «приятности», жизнь моментально потеряет вкус. Поэтому проанализируйте, какая привычка дарит больше удовольствия, а на остальных экономьте.
  - advice2: 
      category: common
      name: Не увеличивайте расходы в случае дополнительных доходов
      description: Не увеличивайте расходы в случае дополнительных доходов
  - advice3: 
      category: takeaway_food
      name: Реже берите еду в доставках и на вынос
      description: |
        На пике популярности в больших городах — готовые завтраки, обеды, ланчи и ужины, которые доставят прямо домой или в офис. Их преимущество понятно: личное время не тратится на готовку, а за самой едой не нужно идти в кафе или магазин. Но если подсчитать траты, то выяснится: доставки «съедают» до 15% дохода тех, кто ими пользуется. Получается дорого, потому что кроме продуктов сервисы закладывают в стоимость приготовление блюд и транспортные расходы. А еще от доставок лучше отказаться из соображений экологии. Вместе с едой вам каждый раз доставляют одноразовую тару, сделанную из пластика. Горячие блюда заворачивают в фольгу, которая не утилизируется.
  - advice4:
      category: common
      name: Грамотно расставьте приоритеты 
      description: |
        Экономия ради экономии малоэффективна. Копить деньги нужно, чтобы чего-то достичь. Но цель «жить лучше» не годится: она слишком расплывчата и не дает устойчивой мотивации. Лучше в качестве ориентиров выбирать что-то материальное и осязаемое.
  - advice5:
      category: monthly_payments
      name: Бережнее относитесь к электроэнергии 
      description: | 
        Экономить электроэнергию проще, чем воду: самые простые шаги прилично уменьшат ежемесячные платежи. Например: Покупайте энергосберегающую технику. Она обычно дороже, но спустя годы сэкономят вам тысячи рублей; Рационально используйте ту технику, что уже есть дома. Речь о плитах, стиральных машинах и чайниках, которые лучше включать реже, но загружать полностью; Грамотно эксплуатируйте технику. Всегда выключайте вилки из розеток. Даже при выключенном приборе энергия продолжает «утекать»;
  - advice6: 
      category: common  
      name: По возможности покупайте оптом
      description: | 
        Этот совет — первый, который приходит в голову при слове «экономия». Покупать оптом действительно выгодно, но непросто: если человек живет один или небольшой семьей, ему не нужен провиант в огромных количествах. Выход — кооперироваться со знакомыми, друзьями и родственниками. Покупать лучше то, что долго лежит — крупы, макароны, сахар, консервированные продукты, напитки в тетрапаках и прочее.
        
  - advice7:    
      category: monthly_payments   
      name: Потребляйте меньше воды
      description: | 
        Коммунальные платежи растут каждый год, и одна из наиболее ощутимых статей расходов — это вода. Ее однозначно стоит использовать бережнее. Предлагаем несколько способов: Установите счетчик. Это поможет сэкономить, если в квартире живет меньше человек, чем зарегистрировано. Да и контролировать расход воды на семью проще, когда есть прибор учета; Рационально пользуйтесь посудомоечной и стиральной машиной. Запускайте их, только когда есть полная нагрузка. Включать такие приборы полупустыми — трата не только воды, но и электричества;

  - advice8:   
      category: monthly_payments    
      name: Подумайте о смене тарифа (на ТВ, телефон и интернет)
      description: | 
        Большинство из нас выбирает интернет-провайдеров и операторов связи наобум. А пакет услуг подключаем тот, который посоветовал консультант. Чтобы не переплачивать, проанализируйте рынок на досуге: какие цены  предлагают компании в вашем городе, каков набор услуг. Даже если вы выбирали тариф осознанно, каждый год пересматривайте линейку: мобильная связь и интернет стремительно дешевеют

  - advice9:  
      category: shopping     
      name: Для шоппинга используйте интернет
      description: | 
        Магазины и бутики завышают цены на товары. Это связано с их расходами на аренду помещения, найм персонала, доставку вещей со складов и прочее. Если не включать эти траты в стоимость, магазин быстро уйдет в минус. Но это не должно волновать покупателя, для которого в приоритете — хорошая цена, качество и большой ассортимент. Поэтому многие делают покупки через интернет — у себя в стране или из-за границы. Насколько это выгодно? Практика показывает, в онлайн-магазине можно купить вещи на 10-20% дешевле, чем в розницу. А еще многие сайты проводят распродажи и акции, за которыми удобно следить через уведомления и рассылки.

  - advice10:       
      category: food
      name: Ищите акции, дисконты и cashback
      description: | 
        На скидках стоит остановиться подробнее. Магазины сегодня борются за покупателя, поэтому в ход идут любые способы его привлечь — ликвидация залежавшихся товаров, акции в честь праздников, сезонные скидки и черные пятницы. Сэкономить на таких мероприятиях можно прилично: продавцы скидывают от 5 до 90% от стоимости товара,в зависимости от специфики магазина. Но главное, на чем экономят продвинутые покупатели — это кэшбэк, или возврат части средств за покупку. Бояться этой опции не стоит: компании предлагают cashback из тех же соображений, что и скидки.

  - advice11:  
      category: food     
      name: Кооперируйтесь с другими людьми
      description: | 
        Сейчас популярны сайты совместных закупок. Это когда люди кооперируются и заказывают оптовую партию товаров.Выгода — в скидке (по отдельности каждый участник заплатит за единицу товара больше). Со знакомыми можно покупать вещи из-за границы, чтобы меньше платить за доставку. Еще один лайфхак — с друзьями и коллегами заведите общий аккаунт в онлайн-магазине. Когда покупки делают часто и на большие суммы, аккаунт накапливаетрепутацию и получает скидку. Это выгодно всем участникам.
  - advice12:   
      category: food    
      name: Откажитесь от всего одноразового
      description: | 
        Сберечь деньги здесь можно несколькими путями. Первое — сократите пищевые отходы. Согласно статистике, в год каждый белорус выбрасывает до 56 кг пищи, а это 5% от купленной провизии. Чтобы не тратить деньги на еду попусту, составляйте меню на неделю, а исходя из него — план покупок в продуктовом магазине. Брать еды нужно столько, сколько вы сможете приготовить и съесть в срок. А еще продукты важно правильно хранить.
  - advice13: 
      category: technic      
      name: Берите вещи и инструменты в аренду
      description: | 
        Возможно, те вещи, которые понадобятся вам в жизни один-два раза, не стоит покупать даже с рук. Берите их напрокат — у знакомых, по объявлению или в конторах, которые этим занимаются. Например, дрели, перфораторы и прочие инструменты нужны большинству семей эпизодически. Тогда их проще взять у знакомых, чем платить за аренду или покупать. Наряды на корпоративы, выпускные и свадьбы надеваются всего один раз — на них неразумно тратить месячный бюджет.
  - advice14:     
      category: common  
      name: Разберитесь с долгами
      description: | 
        Перед тем, как начать экономить, эксперты советуют — разберитесь хотя бы с частью долгов. Деньги, которые вамодолжили друзья и родственники, нас волнуют меньше: по ним не «капает» процент. А вот кредиты и микрозаймы закрывайте в первую очередь. Это можно делать до того, как начнете активно экономить, либо параллельно — свой доход придется откладывать и на кредит, и на подушку безопасности.
  - advice15:    
      category: common   
      name: Повышайте финансовую грамотность
      description: | 
        Многие из нас не знают о своих правах — положенных субсидиях, налоговых вычетах, программах по льготной ипотеке и т.д. Почему так получается? Во-первых, дело в законодательных актах: они написаны на сухом, формальном языке, часто с нечитаемыми канцеляризмами. Во-вторых, в одном законе могут быть отсылки к десяткам других. В-третьих, редакция закона, которую вам выдаст поисковик, может оказаться уже недействующей. И это нормально: никто не обязан персонально информировать россиян об их правах.
  - advice16: 
      category: addiction      
      name: Откажитесь от вредных привычек
      description: | 
        Вредные привычки — курение, алкоголь, пристрастие к жирной и высококалорийной пище — съедают весомую часть бюджета. Но, что важнее, они вредят здоровью, что в будущем выливается в огромные траты на лечение. Поэтому мнение медиков категорично: от сигарет лучше отказаться навсегда, а выпивку себе позволять в особых случаях (во время праздников и семейных торжеств).
  - advice17:     
      category: hobby  
      name: Ищите бесплатные альтернативы
      description: | 
        Чтобы экономить деньги, не отказывайтесь от увлечений и хобби: лучше найдите их бесплатные аналоги. Конечно, путешествия и экстремальный спорт ничем не заменить. Но кое-какие занятия, которые мы привыкли оплачивать, можно организовать себе бесплатно. 
           Тем, кто любит читать. Попробуйте не покупать книги, а брать их в библиотеке. Сейчас во многих доступны 
        не только бумажные, но и электронные версии. 
           Тем, кто любит фитнес и спорт. Поддерживать себя в форме реально без спортзала. Замените тренажеры на 
        упражнения с собственным весом, бегайте по утрам, ищите бесплатные мастер-классы по йоге, пилатесу и др. 
           Тем, кто развивается профессионально. Если хотите освоить новую область или приобрести навык, который 
           пойдет в плюс к уже освоенной профессии — начните с интернета. Бесплатно можно пройти множество онлайн-курсов.
  - advice18:  
      category: shopping     
      name: Измените отношение к покупкам. 
      description: | 
        Научитесь бороться с импульсивными покупками. Если хотите купить что-то, чего не было в ваших планах, возьмите паузу, как минимум, на сутки.  За это время вы сможете трезво оценить, действительно ли вам нужна эта вещь.
  - advice19:     
      category: entertainment  
      name: Записывайте идеи для подарка
      description: | 
        В течение года записывайте все идеи для подарка близким, которые приходят вам в голову и о которых они рассказали вам сами. Накануне праздника просто выберите что-то из списка и отправляйтесь в магазин.
  - advice20:  
      category: food     
      name: Покупки в магазине
      description: | 
        Старайтесь не ходить за продуктами голодной, а за одеждой и крупными покупками — обеспокоенной или расстроенной. Доказано, что в таких состояниях люди склонны к импульсивным тратам.
  - advice21:  
      category: common     
      name: Платите наличными. 
      description: | 
        Исследования показали, что люди, расплачивающиеся кредитной картой или делающие покупки черезИнтернет-кошельки, тратят на 10—15% больше, чем когда платят бумажными деньгами.
  - advice22:    
      category: food   
      name: В магазина смотрите ниже
      description: | 
        Мерчандайзеры поставили на уровне ваших глаз товары, которые нужно продать как можно скорее — или что-то, достаточно дорогое и привлекательное. Не поддавайтесь!
  - advice23:  
      category: common    
      name: Откладывайте фиксированную сумму. 
      description: | 
        Например, каждый день откладывайте по 2 рубля. Кажется, что это немного, но в конце месяца у вас накопится уже 60 рублей, а через год — 720 рублей.
  - advice24:   
      category: common  
      name: Складывайте мелочь в копилку.
      description: | 
         Это самый простой способ для тех, кто часто пользуется наличными. В конце дня или в конце недели отправляйте в копилку всю мелочь из кошелька. Можно откладывать не только мелочь, но и небольшие купюры — например, достоинством 5 или 10 рублей.
  - advice25: 
      category:  common    
      name: Откладывайте все внеплановые доходы.
      description: | 
         Например, премии, деньги от продажи вещей на «Авито», налоговый вычет. Заранее сумму накоплений рассчитатьне получится, но, если вам часто поступают внеплановые доходы, нужную сумму можно накопить быстро.
  - advice26:  
      category: common    
      name: Распределяйте деньги по конвертам.
      description: | 
         Купите 10 конвертов, напишите на них суммы от 100 рублей до тысячи рублей и сложите их в стопку. Каждую неделю не глядя выбирайте один конверт — и откладывайте в него столько, сколько написано. Можно купить 20 
  - advice27:  
      category: food     
      name: Составляйте список покупок перед походом в магазин
      description: | 
        Заранее составленный подробный список поможет избежать незапланированных покупок и приобрести именно то, что нужно семье. В таком списке нужно учитывать запасы дома, набросать примерное меню на ближайшую неделю или две, разбить список на категории.
  - advice28:  
      category: monthly_payments   
      name: Отключайте ненужные подписки
      description: | 
        Регулярно чистите ваш телефон и отключайте платежи за сервисы, которые не используете. Так можно сэкономить от 12 до 50 рублей в месяц.
  - advice29:  
      category: food   
      name: Покупайте сезонные товары
      description: | 
        Обычно в магазинах цены на сезонные продукты и вещи ниже. Например, в мае клубника стоит значительно дешевле, чем в декабре.
  - advice30:  
      category: monthly_payments    
      name: Используйте энергосберегающие технологии
      description: | 
        Хороший способ экономии на коммунальных услугах. Замените лампы на LED, отключайте электроприборы, когда они не используются. 
  - advice31:  
      category: transport    
      name: Используйте общественный транспорт
      description: | 
        Общественный транспорт обходится намного дешевле, чем содержание личного автомобиля или заказ такси. Планируйте проезд, иногда будет дешевле поехать на автобусе или вообще пройтись пешком.
  - advice32:  
      category: monthly_payments    
      name: Регулярно проверяйте тарифы
      description: | 
        Речь идет о тарифах на мобильную связь и интернет. Сравнивайте предложения разных поставщиков и выбирайте самые выгодные. Кроме того, можно использовать лайфхак. Сообщить мобильному оператору, что вы намерены выбрать другого. Чтобы не потерять клиента, вам могутпредложить выгодные условия.
  - advice33:  
      category: shopping    
      name: Покупайте вещи в магазинах распродаж
      description: | 
        Дисконт-центры и магазины-распродаж — это отличный выбор для тех, кто хочет сэкономить и не потерять в качестве одежды и обуви. К тому же, в дисконт-центрах обычно широкий выбор моделей.
  - advice34:  
      category: shopping    
      name: Откажитесь от брендовых товаров
      description: | 
        Хотя товары от известных мировых брендов давно зарекомендовали себя на рынке, модели от неизвестных марок могут не уступать им по качеству, а стоить дешевле. 
  - advice35:  
      category: shopping     
      name: Ремонтируйте вещи, вместо того, чтобы покупать новые 
      description: | 
        Вспомните о том, что порванные джинсы можно зашить, а сломавшийся чайник — отремонтировать. Мелкие поломки и вовсе можно устранить самостоятельно.
  - advice36:  
      category:  entertainment   
      name: Ищите бесплатные мероприятия
      description: | 
        Фестивали, представления, спектакли, выставки и концерты с бесплатным входом не такая большая редкость, особенно в крупных городах. Часто билеты на шоу разыгрываются в группах за репост или лайк
  - advice37:  
      category:  food   
      name:  Покупайте продукты в небольших магазинах
      description: | 
        Неочевидный факт, часто мелкие торговые точки оказываются дешевле супермаркетов и поддерживают локальных производителей.
  - advice38:  
      category: transport    
      name: Следите за ценами на топливо
      description: | 
        Вступите в группы автовладельцев в соцсетях, где регулярно публикуют изменения цен на топливо. Кроме того, оплачивайте горючее картами с кэшбэком, к концу каждого месяца суммы экономии могут быть внушительными. 
  - advice39:  
      category: addiction    
      name:  Откажитесь от вредных привычек
      description: | 
        Курение и алкоголь являются не только вредными, но и дорогими привычками. Отказ от сигарет, например, может сэкономить вам несколько тысяч рублей в месяц. 
  - advice40:  
      category:     
      name: Ежедневные напитки и перекусы. 
      description: | 
        Стаканчик кофе за 5-7 рублей в день кажется мелочью, но за месяц это уже 60-100 рублей. Эту сумму можно отложить на отпуск. Проблема возникает, когда такие траты не запланированы и становятся способом поднять настроение
  - advice41:  
      category: monthly_payments     
      name: Комиссии и ненужные услуги.
      description: | 
        Непроверенные тарифы на связь, интернет или банковские услуги также забирают деньги из бюджета. Простая проверка раз в квартал поможет выявить переплаты.
  - advice42:  
      category:  food   
      name: Сравнивайте цены. 
      description: | 
        Если экономия критична, выделите день (например, воскресенье) и сравните корзины в трех магазинах. Замораживайте продукты для закупки на месяц.
  - advice43:  
      category: technic    
      name: Проверяйте качество и отзывы.
      description: | 
        Если телефон в интернет-магазине дешевле, чем в розничном, то изучите этот магазин. Обязательно прочитайте отзывы, чтобы избежать подделок и проблем с возвратом.
  - advice44:  
      category: shopping     
      name: Контролируйте импульсивные покупки
      description: | 
        Онлайн-покупки слишком доступны: увидел, положил в корзину, оплатил. Используйте правило 24 часов: понравился товар? Подождите сутки. Если забыли о вещи, то она вам не нужна.
  - advice45:  
      category: common    
      name: Записывайте траты сразу. 
      description: | 
        Вносите расходы в течение дня или вечером. Например, купили кофе за 5 рублей — сразу отметьте в категории «кофейни». Так вы будете видеть каждую трату и не забудете, на что потратили деньги.
  - advice46:  
      category: common    
      name: Разделяйте расходы по категориям.
      description: | 
        Делите на обязательные (аренда, продукты) и необязательные (развлечения, одежда). Это позволяет понять, где можно сэкономить без ухудшения качества жизни.
  - advice47:  
      category: common    
      name: Анализируйте.
      description: | 
        Проверяйте, сколько ушло на каждую категорию. Например, если на еду запланировано 300 рублей в месяц, а за две недели потрачено 200 рублей — стоит пересмотреть оставшийся лимит.
  - advice48:  
      category: common    
      name: Корректируйте лимиты по категориям раз в квартал.
      description: | 
        После 2–3 месяцев учета видно, какие статьи бюджета «перебирают». Например, выросли траты на бензин из-за частых поездок или повышения цен? Это повод пересмотреть лимиты.
  - advice49:  
      category: common    
      name: Награждайте себя за достижения. 
      description: | 
        Накопили 5 тысяч рублей? Купите то, о чем давно мечтали, но жалели на этот денег.
  - advice50:  
      category: common     
      name: Потратьте первый пассивный доход.
      description: | 
        Получили 50 рублей от купонов по облигациям? Сходите в кафе или купите мелочь, которая вас порадует. Это помогает почувствовать, что деньги реальны и работают на вас.

  - advice51:  
      category: takeaway_food    
      name: Выбирайте самостоятельно. 
      description: | 
         Когда одногруппники ходят на обеды за 15 рублей, неловко доставать контейнер с едой из дома. Вы идете с ними, чтобы быть в компании, и незаметно тратите больше. Но выбор всегда за вами.
  - advice52:  
      category: entertainment    
      name: Осознанное потребление 
      description: | 
        это когда вы тратите не на автомате, а с вопросом «зачем». Хотите купить фотоаппарат для свадьбы? Спросите себя, будет ли он нужен вам после. Если нет — аренда, скорее всего, будет дешевле покупки.
  - advice53:  
      category: common    
      name: Откажитесь от ненужных расходов
      description: | 
         Если вы начнете записывать расходы таким образом, то через некоторое время заметите любопытные тенденции. Например, что на пакеты из магазина в месяц уходит рублей 200. А на кофе с собой, сладости и кафе — все пять. Есть над чем поразмыслить, правда?
  - advice54: 
      category: food    
      name: Перезагрузите подход к готовке 
      description: | 
        Проанализируйте стоимость своего меню и пересмотрите список покупок в пользу продуктов местного производства и сезонных овощей и фруктов. Чтобы меньше тратить на еду, попробуйте готовить блюда на несколько дней вперёд. Например, куриное филе можно пожарить и съесть за один ужин, а можно отправить его в плов, которого хватит минимум на 2–3 приёма пищи. Постарайтесь отказаться от полуфабрикатов из магазина: многие заготовки легко сделать дома и отправить в морозилку.
  - advice55:  
      category: food   
      name: Составляйте списки и покупайте продукты сразу на неделю
      description: | 
        Определите, какую сумму вы готовы потратить на питание в этом месяце, и разделите её на 4 равные части. Это будет недельный бюджет на питание: исходя из него, можно прикинуть примерное меню и составить список необходимых продуктов. Раз в пару дней заглядывать в супермаркет — плохая идея: есть риск, что рука потянется к ненужной мелочи на кассе или товару по акции, без которого можно было бы обойтись. Старайтесь глобально закупаться раз в неделю, не отступая от списка и выделенной суммы. Еду, которая хранится долго, лучше покупать в оптовых магазинах, а хлеб и зелень — в небольших лавках у дома.
  - advice56:  
      category: food    
      name: Берите с запасом только то, что точно будете есть
      description: | 
        Перед скидками устоять сложно, но ещё сложнее признаться себе, что не стоило тратить деньги на еду, которая в итоге оказалась в мусорном ведре. Не поддавайтесь ажиотажу и покупайте впрок лишь те продукты, которые входят в ваш регулярный рацион. Например, если не любите консервированную рыбу, нет смысла на чёрный день забивать шкаф десятком банок сайры. Есть вы её вряд ли станете, а вот напрасно потратить деньги будет обидно.
  - advice57:  
      category: monthly_payments    
      name: Отключите ненужные сервисы
      description: |  
        Обведите квартиру пристальным взглядом. Может, где-то за телевизором притаилась старая приставка кабельного, которое вы не смотрите, а на полке запылился домашний телефон. Обзвоните обслуживающие компании и уточните, числитесь ли вы в списках абонентов.
  - advice58:  
      category: monthly_payments    
      name: Экономьте на коммунальных услугах
      description: |
        Есть довольно много лайфхаков, которые помогут снизить потребление воды и электричества. Например, можно заменить обычные лампы на энергосберегающие и установить на краны аэраторы. Также стоит быть внимательным к собственным бытовым привычкам. Не запускайте стиральную машину ради одной футболки, гасите свет, когда выходите из комнаты, и выдёргивайте вилки бытовых приборов из розеток после того, как воспользуетесь ими. Наконец, не лейте воду попусту и закрывайте кран, когда чистите зубы, намыливаете лицо или оттираете остатки еды от тарелки или сковородки.
  - advice59:  
      category: household_chemicals    
      name: Покупайте универсальную бытовую химию  
      description: | 
        Реклама настойчиво убеждает, что для каждой поверхности в доме нужно своё чистящее средство. На самом деле можно обойтись без лишних трат. Поищите в магазинах варианты, которые подходят для мытья полов, плитки и сантехники. Например, с помощью универсального средства для удаления жира получится отмыть плиту, стол, кафельный фартук и вытяжку. А ещё выгодно покупать бытовую химию сразу в большой таре.  
  - advice60:  
      category: entertainment    
      name: Ищите дешевые развлечения 
      description: | 
        Если вы решили перейти в режим экономии, это не значит, что придётся днями напролёт сидеть дома. Выбор бюджетных развлечений не такой уж и маленький: например, билеты в кино, музей или на выставку не стоят огромных денег. Чтобы научиться отдыхать экономно, попробуйте организовать себе пару «бесплатных» дней. Можно наведаться в парк и покормить птиц, устроить кинопосиделки для всей семьи или сходить на пробное занятие по танго в школу танцев. А ещё изучите афишу развлечений вашего города: наверняка там найдутся фестивали, ярмарки или мастер-классы в арт-пространствах со свободным входом.
  - advice61:  
      category: beauty    
      name: Откажитесь от популярных салонных процедур 
      description: | 
        Долговременное покрытие ногтей, наращивание волос и ресниц может влететь в копеечку. Если действительно нужно накопить денег, есть смысл на время отказаться от этих услуг. Так вы избавитесь от ежемесячных трат на коррекцию. Если делаете дорогое и сложное окрашивание, вроде балаяжа или омбре, посоветуйтесь с мастером, как из него выйти без вреда для волос и поддерживать цвет в домашних условиях.
  - advice62:  
      category: beauty     
      name: Пересмотрите систему домашнего ухода
      description: | 
        Если вы ограничены в финансах, не тратьте время и деньги на тест-драйв новых продуктов. Отдавайте предпочтение базовым средствам для ухода, в которых вы уверены. Надёжный и проверенный крем точно не полетит в мусорку, а значит, не пополнит список напрасных расходов.
  - advice63:  
      category: beauty    
      name: Ухаживайте за собой самостоятельно
      description: | 
        Можно освоить техники гигиенического маникюра, научиться ровнять бороду и даже стричь волосы — это не так трудно, как кажется на первый взгляд. Изучите видеоуроки, почитайте советы мастеров и не стесняйтесь просить помощи у друзей и знакомых, которые умеют делать что-то подобное. Возможно, ваша близкая подруга прекрасно красит волосы. Чем не повод организовать мастер-класс и овладеть новым навыком?
  - advice64:  
      category:  transport   
      name: Транспорт
      description: | 
        Если расходы на топливо «съедают» значительную часть бюджета, в экстренных финансовых ситуациях стоит пересесть на общественный транспорт. Внимательно изучите свои маршруты и подберите проездной на нужные виды транспорта. Как правило, карточки на месяц или больший срок оказываются выгоднее, чем на определённое количество поездок. А когда расстояние и время позволяют, ходите пешком. Это полезно и бесплатно.
  - advice65:  
      category: shopping     
      name: Почаще берите паузу
      description: | 
        Если вам тяжело уйти из торгового центра без чего-нибудь «для души», вспомните, как часто приходится проводить расхламление, выкидывать ненужное и раздаривать импульсивно купленные вещи друзьям и знакомым. Прежде чем открыть кошелёк, подумайте пару дней, точно ли стоит тратить деньги на очередное приобретение, которое порадует вас от силы пару дней.
  - advice66:  
      category: technic    
      name: Сухой расчет
      description: | 
        Относиться к расходам осознанно поможет простой приём: подсчитайте, сколько часов вам нужно трудиться, чтобы заработать на очередную покупку. Так получится трезво оценить, действительно ли вам необходима эта вещь или лучше отложить деньги на что-то более полезное.
  - advice67:  
      category: shopping     
      name: Подружитесь с распродажами и покупайте вещи не по сезону
      description: | 
        Как правило, купальники стоят дешевле зимой, а пуховики — летом. Если вы научитесь грамотно планировать расходы и откладывать по чуть-чуть в отдельный конверт для необходимых покупок, то на глобальных распродажах можно выгодно пополнить гардероб.
  - advice68:  
      category: health     
      name: Общайтесь с фармацевтами
      description: | 
        У многих брендовых препаратов есть бюджетные аналоги с той же дозировкой действующего вещества. Рисковать и подбирать их самостоятельно, конечно, не стоит, но проконсультироваться у фармацевта можно. А ещё не стесняйтесь просить в аптеке «самое простое». Даже обыкновенная зелёнка, но в виде фломастера, может стоить в три раза дороже, чем привычный раствор в пузырьке.


  - advice69:  
      category: technic    
      name: Арендуйте то, что не понадобится надолго
      description: | 
        Нет смысла покупать дрель, если вам раз в год нужно прикрутить полку, или вкладываться в лыжную экипировку для всей семьи, если горы вы видите только в отпуске. Присмотритесь к аренде. Во-первых, так дешевле, а во-вторых, не придётся думать, где хранить вещь, которая нужна лишь изредка. Беговые дорожки, детские ходунки, карнавальные костюмы, строительные инструменты, сноуборды, костыли, телевизоры — всё это можно взять напрокат.
  - advice70:  
      category: common    
      name: Устроить челлендж
      description: | 
        Вы можете превратить процесс накопления в квест со своими собственными условиями. Например, откладывать каждый месяц больше, чем в предыдущий, или собрать определённую сумму к конкретной дате. Если вы азартный человек, способ накопления уже не так важен: вы приложите максимум усилий, чтобы исполнить задуманное.
  - advice71:  
      category: common    
      name: Внешний судья 
      description: | 
        Если вашей внутренней мотивации недостаточно, чтобы копить активнее, привлеките внешнего арбитра. Например, поспорьте с другом — и лучше не на деньги, а то рискуете не только не накопить, но и потерять.
  - advice72:  
      category: common    
      name: Копить деньги от несделанных покупок
      description: | 
         Мы тратим деньги не только потому, что хотим что‑то приобрести. Часто это способ порадовать себя. Но средства, поступившие на накопительный счёт, тоже повод для хорошего настроения.
         Tак что, если вам свойственны импульсивные покупки (неважно, что это — пачка печенья или новые джинсы), каждый раз в магазине думайте, так ли нужна эта вещь. И если нет, откладывайте сумму, которую собирались потратить.
  - advice73:  
      category: common     
      name:  Ежедневно переводить на накопительный счёт остаток
      description: | 
        В век электронных технологий шансы на то, что ваши карманы набиты наличными, невелики. Но вы можете ежедневно переводить в «копилку» своеобразную мелочь со счёта — так, чтобы округлить остаток.
        Скажем, в конце дня у вас на карте осталось 247 рублей. Вы можете отложить 7 рублей, чтобы осталось 240, или 47 рублей, чтобы осталось ровно 200. Сколько нулей вы должны получить после этих манипуляций, зависит от вашего благосостояния.
  - advice74:  
      category: monthly_payments    
      name: Экономить на том, чем вы не пользуетесь
      description: |  
         Все знают: чтобы накопить, надо экономить. Но делать это не так‑то просто. Хотя есть элементарный способ сберечь деньги — сократить расходы на то, чем не пользуешься. Скажем, зачем вы год за годом покупаете абонемент в тренажёрный зал, если ходите туда раз в месяц? Разорвите контракт и заберите остаток средств.
         Переберите подписки и сервисы, избавьтесь от того, что тянет из вас деньги, но практически не приносит пользы. Всё это не пригодится. А если да, что ж, подпишетесь ещё раз.     
  - advice75:  
      category: common    
      name: Завести копилку
      description: | 
        В детстве вы наверняка ждали, когда папа встряхнёт джинсы или брюки, чтобы оттуда высыпались монетки. Если как следует исследовать ковёр и пространство под диваном, можно было разбогатеть!
        Сейчас монеты по покупательной способности не те, что раньше. Но, если вы пользуетесь наличными, пренебрегать ими не стоит. Заведите копилку и каждый вечер сгружайте в неё мелочь из карманов. Если готовы пойти дальше, откладывайте часть денег с каждой разменянной купюры. 
  - advice76:  
      category: common    
      name: Устраивать разгрузочные дни
      description: | 
        Выберите пару дней в неделю, когда вы ничего не будете тратить, за исключением необходимого вроде оплаты проезда. Никаких походов в магазин, внеплановых посиделок с друзьями, развлечений в этот день не предусмотрено — полная аскеза.
        Самое сложно здесь не отказаться от расходов, а сохранить сэкономленное. Так что по итогам разгрузочного дня откладывайте сумму, которую удалось сберечь.

      
  - advice77:  
      category: hobby    
      name: Попробуйте монетизировать хобби
      description: |  
        Например, если вы умеете вязать, можно продавать свои изделия онлайн или на ярмарках. Далее: https://www.sravni.ru/text/kak-nauchitsya-kopit/?copy     
  - advice78:  
      category: common    
      name: Соблазн потратить накопленные деньги
      description: | 
        Регулярно визуализируйте свою цель и представляйте, как будете себя чувствовать, когда достигнете её. Далее: https://www.sravni.ru/text/kak-nauchitsya-kopit/?copy      
  - advice79:  
      category: common    
      name: Награда 
      description: |
        Поощряйте себя за достижение промежуточных целей и конкретных сумм (например, небольшим подарком). Далее: https://www.sravni.ru/text/kak-nauchitsya-kopit/?copy       
  - advice80:  
      category: common    
      name: Страховка
      description: | 
        Застрахуйте свою жизнь, здоровье и имущество, чтобы защититься от финансовых рисков. Далее: https://www.sravni.ru/text/kak-nauchitsya-kopit/?copy      
  - advice81:  
      category: common     
      name: Избегайте давления
      description: |   
        Помните, зачем вы копите деньги, и не позволяйте окружающим сбить вас с пути. Далее: https://www.sravni.ru/text/kak-nauchitsya-kopit/?copy    
  - advice82:  
      category: common    
      name: Игнорируйте провакации окружения
      description: |   
         Научитесь отказываться от предложений, которые не соответствуют финансовым целям. Далее: https://www.sravni.ru/text/kak-nauchitsya-kopit/?copy    
  - advice83:  
      category: common     
      name: Пересмотрите окружение
      description: |  
