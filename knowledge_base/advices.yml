types:
  - advice0: 
      category: entertainment
      name: Экономия на подарках
      description: |
         Не покупайте подарок в последний момент: вы потратите больше денег и вместо «той самой» 
         вещи подарите случайную ерунду, которая не будет радовать. Если речь идет о подарках к всеобщим праздникам, 
         накануне вы увидите задранные цены и пустые полки. Обидно? Еще бы.
  - advice1:
      category: takeaway_food
      name: Откажитесь от походов в кафе и рестораны
      description: Такие траты мы привыкли не замечать, но их урезание — верный способ сэкономить 10-15% дохода. 
                   Но важно не переусердствовать. Если исключите все «приятности», жизнь моментально потеряет вкус. 
                   Поэтому проанализируйте, какая привычка дарит больше удовольствия, а на остальных экономьте.
  - advice2: 
      category: common
      name: Не увеличивайте расходы в случае дополнительных доходов
      description: Не увеличивайте расходы в случае дополнительных доходов
  - advice3: 
      category: takeaway_food
      name: Реже берите еду в доставках и на вынос
      description: |
        На пике популярности в больших городах — готовые завтраки, обеды, ланчи и ужины, 
        которые доставят прямо домой или в офис. Их преимущество понятно: личное время не 
        тратится на готовку, а за самой едой не нужно идти в кафе или магазин. Но если подсчитать 
        траты, то выяснится: доставки «съедают» до 15% дохода тех, кто ими пользуется. 
        Получается дорого, потому что кроме продуктов сервисы закладывают в стоимость приготовление 
        блюд и транспортные расходы. А еще от доставок лучше отказаться из соображений экологии. 
        Вместе с едой вам каждый раз доставляют одноразовую тару, сделанную из пластика. Горячие блюда 
        заворачивают в фольгу, которая не утилизируется.
  - advice4:
      category: common
      name: Грамотно расставьте приоритеты 
      description: |
        Экономия ради экономии малоэффективна. Копить деньги нужно, чтобы чего-то достичь. 
        Но цель «жить лучше» не годится: она слишком расплывчата и не дает устойчивой мотивации. 
        Лучше в качестве ориентиров выбирать что-то материальное и осязаемое.
  - advice5:
      category: monthly_payments
      name: Бережнее относитесь к электроэнергии 
      description: | 
        Экономить электроэнергию проще, чем воду: самые простые шаги прилично 
        уменьшат ежемесячные платежи. Например: Покупайте энергосберегающую технику. 
        Она обычно дороже, но спустя годы сэкономят вам тысячи рублей; 
        Рационально используйте ту технику, что уже есть дома. Речь о плитах, стиральных 
        машинах и чайниках, которые лучше включать реже, но загружать полностью; 
        Грамотно эксплуатируйте технику. Всегда выключайте вилки из розеток. 
        Даже при выключенном приборе энергия продолжает «утекать»;
  - advice6: 
      category: common  
      name: По возможности покупайте оптом
      description: | 
        Этот совет — первый, который приходит в голову при слове «экономия». Покупать оптом действительно выгодно, 
        но непросто: если человек живет один или небольшой семьей, ему не нужен провиант в огромных количествах. 
        Выход — кооперироваться со знакомыми, друзьями и родственниками. Покупать лучше то, что долго лежит — крупы, 
        макароны, сахар, консервированные продукты, напитки в тетрапаках и прочее.
        
  - advice7:    
      category: monthly_payments   
      name: Потребляйте меньше воды
      description: | 
        Коммунальные платежи растут каждый год, и одна из наиболее ощутимых статей расходов — это вода. 
        Ее однозначно стоит использовать бережнее. Предлагаем несколько способов: 
        Установите счетчик. Это поможет сэкономить, если в квартире живет меньше человек, чем зарегистрировано. 
        Да и контролировать расход воды на семью проще, когда есть прибор учета; 
        Рационально пользуйтесь посудомоечной и стиральной машиной. Запускайте их, только когда есть полная нагрузка. 
        Включать такие приборы полупустыми — трата не только воды, но и электричества;

  - advice8:   
      category: monthly_payments    
      name: Подумайте о смене тарифа (на ТВ, телефон и интернет)
      description: | 
        Большинство из нас выбирает интернет-провайдеров и операторов связи наобум. А пакет услуг подключаем тот, 
        который посоветовал консультант. Чтобы не переплачивать, проанализируйте рынок на досуге: какие цены 
        предлагают компании в вашем городе, каков набор услуг. Даже если вы выбирали тариф осознанно, каждый год 
        пересматривайте линейку: мобильная связь и интернет стремительно дешевеют

  - advice9:  
      category: shopping     
      name: Для шоппинга используйте интернет
      description: | 
        Магазины и бутики завышают цены на товары. Это связано с их расходами на аренду помещения, найм персонала, 
        доставку вещей со складов и прочее. Если не включать эти траты в стоимость, магазин быстро уйдет в минус. 
        Но это не должно волновать покупателя, для которого в приоритете — хорошая цена, качество и большой 
        ассортимент. Поэтому многие делают покупки через интернет — у себя в стране или из-за границы. 
        Насколько это выгодно? Практика показывает, в онлайн-магазине можно купить вещи на 10-20% дешевле, 
        чем в розницу. А еще многие сайты проводят распродажи и акции, за которыми удобно следить через уведомления 
        и рассылки.

  - advice10:       
      category: food
      name: Ищите акции, дисконты и cashback
      description: | 
        На скидках стоит остановиться подробнее. Магазины сегодня борются за покупателя, поэтому в ход идут любые 
        способы его привлечь — ликвидация залежавшихся товаров, акции в честь праздников, сезонные скидки и черные 
        пятницы. Сэкономить на таких мероприятиях можно прилично: продавцы скидывают от 5 до 90% от стоимости товара,
         в зависимости от специфики магазина. Но главное, на чем экономят продвинутые покупатели — это кэшбэк, или 
         возврат части средств за покупку. Бояться этой опции не стоит: компании предлагают cashback из тех же 
         соображений, что и скидки.

  - advice11:  
      category: food     
      name: Кооперируйтесь с другими людьми
      description: | 
        Сейчас популярны сайты совместных закупок. Это когда люди кооперируются и заказывают оптовую партию товаров.
         Выгода — в скидке (по отдельности каждый участник заплатит за единицу товара больше). Со знакомыми можно 
         покупать вещи из-за границы, чтобы меньше платить за доставку. Еще один лайфхак — с друзьями и коллегами 
         заведите общий аккаунт в онлайн-магазине. Когда покупки делают часто и на большие суммы, аккаунт накапливает
          репутацию и получает скидку. Это выгодно всем участникам.
  - advice12:   
      category: food    
      name: Откажитесь от всего одноразового
      description: | 
        Сберечь деньги здесь можно несколькими путями. Первое — сократите пищевые отходы. Согласно статистике, в год 
        каждый белорус выбрасывает до 56 кг пищи, а это 5% от купленной провизии. Чтобы не тратить деньги на еду 
        попусту, составляйте меню на неделю, а исходя из него — план покупок в продуктовом магазине. Брать еды нужно 
        столько, сколько вы сможете приготовить и съесть в срок. А еще продукты важно правильно хранить.
  - advice13: 
      category: technic      
      name: Берите вещи и инструменты в аренду
      description: | 
        Возможно, те вещи, которые понадобятся вам в жизни один-два раза, не стоит покупать даже с рук. Берите их 
        напрокат — у знакомых, по объявлению или в конторах, которые этим занимаются. Например, дрели, перфораторы и 
        прочие инструменты нужны большинству семей эпизодически. Тогда их проще взять у знакомых, чем платить за 
        аренду или покупать. Наряды на корпоративы, выпускные и свадьбы надеваются всего один раз — на них неразумно 
        тратить месячный бюджет.
  - advice14:     
      специфики
      category: common  
      name: Разберитесь с долгами
      description: | 
        Перед тем, как начать экономить, эксперты советуют — разберитесь хотя бы с частью долгов. Деньги, которые вам
        одолжили друзья и родственники, нас волнуют меньше: по ним не «капает» процент. А вот кредиты и микрозаймы 
        закрывайте в первую очередь. Это можно делать до того, как начнете активно экономить, либо параллельно — свой 
        доход придется откладывать и на кредит, и на подушку безопасности.
  - advice15:    
      categories: common   
      name: Повышайте финансовую грамотность
      description: | 
        Многие из нас не знают о своих правах — положенных субсидиях, налоговых вычетах, программах по льготной ипотеке и т.д. Почему так получается? Во-первых, дело в законодательных актах: они написаны на сухом, формальном языке, часто с нечитаемыми канцеляризмами. Во-вторых, в одном законе могут быть отсылки к десяткам других. В-третьих, редакция закона, которую вам выдаст поисковик, может оказаться уже недействующей. И это нормально: никто не обязан персонально информировать россиян об их правах.
  - advice16: 
      category: addiction      
      name: Откажитесь от вредных привычек
      description: | 
        Вредные привычки — курение, алкоголь, пристрастие к жирной и высококалорийной пище — съедают весомую часть бюджета. Но, что важнее, они вредят здоровью, что в будущем выливается в огромные траты на лечение. Поэтому мнение медиков категорично: от сигарет лучше отказаться навсегда, а выпивку себе позволять в особых случаях (во время праздников и семейных торжеств).
  - advice17:     
      categories: hobby  
      name: Ищите бесплатные альтернативы
      description: | 
        Чтобы экономить деньги, не отказывайтесь от увлечений и хобби: лучше найдите их бесплатные аналоги. 
        Конечно, путешествия и экстремальный спорт ничем не заменить. Но кое-какие занятия, которые мы привыкли 
        оплачивать, можно организовать себе бесплатно. 
           Тем, кто любит читать. Попробуйте не покупать книги, а брать их в библиотеке. Сейчас во многих доступны 
        не только бумажные, но и электронные версии. 
           Тем, кто любит фитнес и спорт. Поддерживать себя в форме реально без спортзала. Замените тренажеры на 
        упражнения с собственным весом, бегайте по утрам, ищите бесплатные мастер-классы по йоге, пилатесу и др. 
           Тем, кто развивается профессионально. Если хотите освоить новую область или приобрести навык, который 
           пойдет в плюс к уже освоенной профессии — начните с интернета. Бесплатно можно пройти множество онлайн-курсов.
  - advice18:  
      category: shopping     
      name: Измените отношение к покупкам. 
      description: | 
        Научитесь бороться с импульсивными покупками. Если хотите купить что-то, чего не было в ваших планах, возьмите паузу, 
        как минимум, на сутки.  За это время вы сможете трезво оценить, действительно ли вам нужна эта вещь.
  - advice19:     
      category: entertainment  
      name: Записывайте идеи для подарка
      description: | 
        В течение года записывайте все идеи для подарка близким, которые приходят вам в голову и о которых они 
        рассказали вам сами. Накануне праздника просто выберите что-то из списка и отправляйтесь в магазин.
  - advice20:  
      categories: food     
      name: Покупки в магазине
      description: | 
        Старайтесь не ходить за продуктами голодной, а за одеждой и крупными покупками — обеспокоенной или 
        расстроенной. Доказано, что в таких состояниях люди склонны к импульсивным тратам.
  - advice21:  
      categories: common     
      name: Платите наличными. 
      description: | 
        Исследования показали, что люди, расплачивающиеся кредитной картой или делающие покупки через
         Интернет-кошельки, тратят на 10—15% больше, чем когда платят бумажными деньгами.
  - advice22:    
      categories: food   
      name: В магазина смотрите ниже
      description: | 
        Мерчандайзеры поставили на уровне ваших глаз товары, которые нужно продать как можно скорее — 
        или что-то, достаточно дорогое и привлекательное. Не поддавайтесь!
