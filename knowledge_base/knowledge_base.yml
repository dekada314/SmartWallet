# 3. ПРАВИЛА ЛОГИЧЕСКОГО ВЫВОДА (Inference Engine)
# Логика, по которой бот дает советы.
rules:
  - id: "overspend_critical"
    condition: "current_expense > user_limit AND category.priority <= 2"
    text: "⚠️ Внимание! Лимит по важной категории '{category}' превышен. Будьте осторожны с дальнейшими тратами."

  - id: "optional_expense_warning"
    condition: "current_expense > (user_limit * 0.8) AND category.priority >= 4"
    text: "🔔 Вы почти израсходовали лимит на '{category}'. Это необязательные траты, может стоит приберечь деньги?"

  - id: "addiction_control"
    condition: "category.id == 'addiction' AND amount > 50"
    text: "💡 Заметил крупную трату на вредные привычки. Попробуйте отложить эти деньги в 'копилку' в следующем месяце!"

  - id: "essential_priority"
    condition: "user.balance < 100 AND category.is_essential == false"
    text: "🛑 Стоп! Баланс карты низкий. Категория '{category}' не является обязательной. Рекомендую воздержаться от покупки."
  # 3. ПРАВИЛА ЛОГИЧЕСКОГО ВЫВОДА (Inference Engine)
rules:
  # --- ГРУППА А: КРИТИЧЕСКИЕ (ВЫЖИВАНИЕ) ---
  - id: "hard_limit_exceeded"
    condition: "current_expense > user_limit"
    text: "🚨 Стоп! Лимит по категории '{category}' исчерпан. Дальнейшие траты приведут к дефициту бюджета."

  - id: "low_balance_essential_check"
    condition: "user.balance < 50 AND category.is_essential == false"
    text: "📉 Баланс критический (меньше 50р). Категория '{category}' не обязательна. Может, отложим до стипендии?"

  - id: "emergency_health"
    condition: "category.id == 'health' AND amount > 200"
    text: "🩺 Ого, крупная трата на здоровье. Напоминаю: на лекарствах и врачах не экономят, но проверь возможность налогового вычета!"

  # --- ГРУППА Б: ПОВЕДЕНЧЕСКИЕ (ПРИВЫЧКИ) ---
  - id: "coffee_addict"
    condition: "category.id == 'takeaway_food' AND count_per_day >= 3"
    text: "☕️ Третий визит в кофейню за день? Твой пульс и кошелек в легком шоке. Может, сегодня хватит?"

  - id: "beauty_splurge"
    condition: "category.id == 'beauty' AND amount > 150"
    text: "💅 Серьезное вложение в красоту! Главное, чтобы результат радовал. Не забудь заложить эту сумму в план на следующий месяц."

  - id: "fastfood_streak"
    condition: "category.id == 'takeaway_food' AND count_per_week > 5"
    text: "🍔 Похоже, на этой неделе ты частый гость в фастфуде. Домашняя еда сэкономила бы тебе минимум 40% этой суммы."

  - id: "subscription_trap"
    condition: "category.id == 'digital_services' AND count_per_month > 5"
    text: "🎧 Заметил много мелких подписок. Проверь список активных сервисов — часто мы платим за то, чем уже не пользуемся."

  - id: "taxi_vs_transport"
    condition: "category.id == 'transport' AND amount > 25"
    text: "🚕 Дорогая поездка! Если это такси в час пик — сочувствую. Если нет — вспомни про существование метро, там нет пробок."

  # --- ГРУППА В: ТАЙМИНГ (ВРЕМЯ И КАЛЕНДАРЬ) ---
  - id: "night_food_order"
    condition: "category.id == 'takeaway_food' AND time > '23:00'"
    text: "🌙 Ночной дожор? Доставка в это время всегда дороже. Твой бюджет просит пощады (и сна)!"

  - id: "weekend_party_alert"
    condition: "day_of_week in ['Sat', 'Sun'] AND category.id == 'entertainment' AND amount > 100"
    text: "🎉 Выходные удались! Но следи за балансом, чтобы понедельник не стал 'черным' днем для кошелька."

  - id: "early_month_waste"
    condition: "day_of_month < 10 AND total_spent > (monthly_limit * 0.5)"
    text: "⚠️ Только начало месяца, а ты уже потратила половину бюджета! Давай притормозим, впереди еще 20 дней."

  - id: "end_of_month_pro"
    condition: "day_of_month > 25 AND user.balance > 150"
    text: "🌟 Ого! Конец месяца, а у тебя еще солидный запас. Ты настоящий мастер финансового планирования!"

  # --- ГРУППА Г: СПЕЦИФИЧЕСКИЕ (ХОББИ И УЧЕБА) ---
  - id: "education_investment"
    condition: "category.id == 'education' AND amount > 50"
    text: "📚 Траты на учебу — это лучшие инвестиции. Эти знания окупятся многократно, так что тут ты молодец!"

  - id: "hobby_impulse"
    condition: "category.id == 'hobby' AND amount > 100"
    text: "🎨 Новое снаряжение для хобби? Круто! Главное, чтобы оно не пылилось на полке, как тот эспандер в прошлом году."

  - id: "chancellery_rush"
    condition: "category.id == 'chancellery' AND amount > 40"
    text: "🖋 Закупилась канцелярией? Похоже, кто-то настроен серьезно учиться. Или просто красивые блокноты — твоя слабость?"

  # --- ГРУППА Д: ВРЕДНЫЕ ПРИВЫЧКИ (ADDICTION) ---
  - id: "addiction_high_priority"
    condition: "category.id == 'addiction' AND user.balance < 30"
    text: "🛑 Денег почти нет, а ты тратишь на вредные привычки. Это плохой знак. Может, сегодня обойдемся без этого?"

  - id: "addiction_summary"
    condition: "category.id == 'addiction' AND count_per_week > 4"
    text: "🚬 Заметил частое пополнение в этой категории. Попробуй посчитать, сколько бы ты накопила на новый iPhone, если бы бросила."

  # --- ГРУППА Е: ДОМ И БЫТ ---


  - id: "chemicals_stock"
    condition: "category.id == 'household_chemicals' AND amount > 60"
    text: "🧼 Большая закупка бытовой химии. Зато теперь на месяц вперед можно забыть о порошках и моющих!"